[mysqld]
datadir=C:/Program Files/MariaDB 12.1/data
port=3306
bind-address=0.0.0.0
ft_min_word_len=3
# tuned for ~32GB RAM: InnoDB is primary storage engine
innodb_buffer_pool_size=24576M
# Aria used for some internal tables; increased for CTEs/Subqueries in services
aria_pagecache_buffer_size=2048M
# allow more concurrent connections for PM2 cluster (adjust as needed)
max_connections=1000

# Aria tuning - optimiert für deine Services
aria_pagecache_segments=16
aria_pagecache_file_hash_size=1024
aria_repair_threads=4

# Temp Table Settings - weniger Aria-Last
tmp_table_size=256M
max_heap_table_size=256M

# Buffer für komplexe Queries (Dashboard, Search)
join_buffer_size=4M
sort_buffer_size=4M
read_buffer_size=2M
read_rnd_buffer_size=4M

# InnoDB tuning
innodb_buffer_pool_instances=8
innodb_log_file_size=536870912
innodb_io_capacity=2000
innodb_io_capacity_max=4000

# Global
table_open_cache=2000
thread_cache_size=100
open_files_limit=10000

event_scheduler = ON


[client]
port=3306
plugin-dir=C:\Program Files\MariaDB 12.1/lib/plugin